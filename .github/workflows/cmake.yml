# .github/workflows/intel-openmpi.yml
on:
  pull_request:        # run on every PR event :contentReference[oaicite:0]{index=0}
  push:
    branches:
      - main          # and on pushes to main :contentReference[oaicite:1]{index=1}

name: Build with Intel oneAPI & OpenMPI

jobs:
  build:
    runs-on: ubuntu-latest  # has ~21 GB free by default :contentReference[oaicite:2]{index=2}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create keyring directory
        run: sudo mkdir -p /usr/share/keyrings

      - name: Download & dearmor Intel GPG key
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null  :contentReference[oaicite:3]{index=3}

      - name: Add Intel oneAPI APT source
        run: |
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneapi.list  :contentReference[oaicite:4]{index=4}

      - name: Update & install Intel oneAPI compilers & MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            intel-oneapi-compiler-dpcpp-cpp \
            intel-oneapi-compiler-fortran \
            intel-oneapi-mpi-openmpi  :contentReference[oaicite:5]{index=5}

      - name: Install system OpenMPI
        run: sudo apt-get install -y libopenmpi-dev openmpi-bin  :contentReference[oaicite:6]{index=6}

      - name: Source Intel oneAPI environment
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force  :contentReference[oaicite:7]{index=7}

      - name: Configure & Build with CMake
        shell: bash
        run: |
          source /optintel/oneapi/setvars.sh --force
          export OMPI_CC=icx OMPI_CXX=icpx OMPI_FC=ifx  :contentReference[oaicite:8]{index=8}
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=mpicc \
            -DCMAKE_CXX_COMPILER=mpicxx \
            -DCMAKE_Fortran_COMPILER=mpifort
          make -j$(nproc)
