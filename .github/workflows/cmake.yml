name: Build with Intel oneAPI & OpenMPI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create keyring directory
        run: sudo mkdir -p /usr/share/keyrings

      - name: Download & dearmor Intel GPG key
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null

      - name: Add Intel oneAPI APT source
        run: |
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneapi.list

      - name: Update & install Cmake, Ninja, GCC and Intel MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build intel-oneapi-mpi-devel libopenmpi-dev openmpi-bin

      - name: Configure
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force
          cmake -S . -B build -G Ninja \
                -DCMAKE_CXX_COMPILER=g++-14 \
                -DBUILD_MPI=ON \
                -DBUILD_TESTING=ON

      - name: Build
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force
          cmake --build build --parallel

      - name: Test
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force
          ctest --test-dir build --output-on-failure
