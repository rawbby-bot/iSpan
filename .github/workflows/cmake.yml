# .github/workflows/intel-openmpi.yml
name: Build with Intel oneAPI & OpenMPI

on:
  pull_request:       # run on every PR event
  push:
    branches:
      - main         # and on pushes to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare APT keyrings directory
        run: sudo mkdir -p /etc/apt/keyrings

      - name: Add Intel oneAPI GPG key
        run: |
          curl -fsSL https://apt.repos.intel.com/oneapi/gpgkey \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/intel-oneapi.gpg > /dev/null

      - name: Add Intel oneAPI APT source
        run: |
          echo "Types: deb" \
            | sudo tee /etc/apt/sources.list.d/intel-oneapi.sources
          echo "URIs: https://apt.repos.intel.com/oneapi" \
            | sudo tee -a /etc/apt/sources.list.d/intel-oneapi.sources
          echo "Suites: all" \
            | sudo tee -a /etc/apt/sources.list.d/intel-oneapi.sources
          echo "Components: main" \
            | sudo tee -a /etc/apt/sources.list.d/intel-oneapi.sources
          echo "Signed-By: /etc/apt/keyrings/intel-oneapi.gpg" \
            | sudo tee -a /etc/apt/sources.list.d/intel-oneapi.sources

      - name: Install Intel oneAPI compilers & MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            intel-oneapi-compiler-dpcpp-cpp \
            intel-oneapi-compiler-fortran \
            intel-oneapi-mpi-openmpi

      - name: Install system OpenMPI
        run: sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: Source Intel oneAPI environment
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force

      - name: Configure & Build with CMake
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force
          export OMPI_CC=icx
          export OMPI_CXX=icpx
          export OMPI_FC=ifx
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=mpicc \
            -DCMAKE_CXX_COMPILER=mpicxx \
            -DCMAKE_Fortran_COMPILER=mpifort
          make -j$(nproc)
