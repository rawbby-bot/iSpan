name: Build with Intel oneAPI & OpenMPI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create keyring directory
        run: sudo mkdir -p /usr/share/keyrings

      - name: Download & dearmor Intel GPG key
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null

      - name: Add Intel oneAPI APT source
        run: |
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneapi.list

      - name: Update & install Intel oneAPI compilers & MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            intel-oneapi-compiler-dpcpp-cpp \
            intel-oneapi-compiler-fortran \
            intel-oneapi-mpi-devel \
            libopenmpi-dev \
            openmpi-bin

      - name: Source Intel oneAPI environment
        shell: bash
        run: source /opt/intel/oneapi/setvars.sh --force

      - name: Configure & Build with CMake
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force
          export OMPI_CC=icx OMPI_CXX=icpx OMPI_FC=ifx
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=mpicc \
            -DCMAKE_CXX_COMPILER=mpicxx \
            -DCMAKE_Fortran_COMPILER=mpifort
          make -j$(nproc)
